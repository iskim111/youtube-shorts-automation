services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shorts
      POSTGRES_PASSWORD: shorts
      POSTGRES_DB: shorts_automation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shorts -d shorts_automation"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: shorts
      RABBITMQ_DEFAULT_PASS: shorts
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://shorts:shorts@postgres:5432/shorts_automation
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://shorts:shorts@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_ENDPOINT: http://minio:9000
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    profiles: ["app"]

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    profiles: ["app"]

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://shorts:shorts@postgres:5432/shorts_automation
      CELERY_BROKER_URL: amqp://shorts:shorts@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      USE_CELERY: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    profiles: ["app"]

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://shorts:shorts@postgres:5432/shorts_automation
      CELERY_BROKER_URL: amqp://shorts:shorts@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - worker
    profiles: ["app"]

volumes:
  postgres_data:
  minio_data:
